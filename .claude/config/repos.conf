# Convergio project repo registry for mesh-sync-all.sh
#
# Fields:
#   path       - repo path on peer (~ expanded remotely)
#   branch     - default branch to pull
#   gh_account - GitHub account for `gh auth switch` (HTTPS auth)
#   sync_files - comma-separated non-git files to SCP after pull

[Convergio]
path=~/GitHub/Convergio
branch=master
gh_account=Roberdan
