openapi: '3.1.0'
info:
  title: Convergio Platform Daemon API
  version: 18.0.0
  description: |
    Control plane API for the Convergio Platform daemon.
    Manages plans, agents, mesh, IPC, workspaces, evolution, and more.
  license:
    name: MPL-2.0
    url: https://www.mozilla.org/en-US/MPL/2.0/
  contact:
    name: Convergio Platform
    url: https://github.com/Roberdan/convergio

servers:
  - url: http://localhost:8420
    description: Local daemon

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Token from ~/.convergio/auth/daemon.token

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
        code: { type: string }

    HealthStatus:
      type: object
      properties:
        ok: { type: boolean }
        version: { type: string }
        uptime_secs: { type: integer }

    DeepHealthStatus:
      type: object
      properties:
        ok: { type: boolean }
        db: { type: string }
        mesh: { type: string }
        ipc: { type: string }
        checks: { type: object, additionalProperties: { type: string } }

    Repository:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        path: { type: string }
        remote_url: { type: string }
        branch: { type: string }
        last_synced: { type: string, format: date-time }

    Idea:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        body: { type: string }
        status: { type: string, enum: [raw, promoted, archived] }
        created_at: { type: string, format: date-time }
        tags: { type: array, items: { type: string } }

    Note:
      type: object
      properties:
        id: { type: string }
        idea_id: { type: string }
        content: { type: string }
        created_at: { type: string, format: date-time }

    Agent:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        status: { type: string, enum: [active, idle, blocked] }
        task_id: { type: string, nullable: true }
        started_at: { type: string, format: date-time }

    Plan:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        status: { type: string, enum: [todo, doing, done, cancelled] }
        project_id: { type: string }
        created_at: { type: string, format: date-time }

    Task:
      type: object
      properties:
        id: { type: integer }
        plan_id: { type: integer }
        title: { type: string }
        status: { type: string, enum: [pending, in_progress, submitted, done, blocked, skipped, cancelled] }
        wave: { type: string }
        assigned_to: { type: string, nullable: true }

    Peer:
      type: object
      properties:
        name: { type: string }
        host: { type: string }
        port: { type: integer }
        status: { type: string, enum: [online, offline, degraded] }
        last_seen: { type: string, format: date-time }

    MeshStatus:
      type: object
      properties:
        node_id: { type: string }
        peers: { type: integer }
        sync_lag_ms: { type: integer }
        status: { type: string }

    TokenUsage:
      type: object
      properties:
        date: { type: string, format: date }
        total_tokens: { type: integer }
        by_model: { type: object, additionalProperties: { type: integer } }

    Notification:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        message: { type: string }
        read: { type: boolean }
        created_at: { type: string, format: date-time }

    NightlyJob:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string }
        last_run: { type: string, format: date-time, nullable: true }
        next_run: { type: string, format: date-time, nullable: true }

    ChatSession:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        model: { type: string }
        created_at: { type: string, format: date-time }

    WorkspaceInfo:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        path: { type: string }
        branch: { type: string }
        status: { type: string }

    Run:
      type: object
      properties:
        id: { type: string }
        plan_id: { type: integer }
        status: { type: string, enum: [running, paused, done, failed] }
        started_at: { type: string, format: date-time }
        tokens_used: { type: integer }

    EvolutionProposal:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        status: { type: string, enum: [pending, approved, rejected] }
        roi_estimate: { type: number }
        created_at: { type: string, format: date-time }

    IpcMessage:
      type: object
      properties:
        type: { type: string }
        task_id: { type: string, nullable: true }
        agent: { type: string }
        summary: { type: string }
        timestamp: { type: string, format: date-time }

    OkResponse:
      type: object
      properties:
        ok: { type: boolean }
        rows_changed: { type: integer }

paths:
  # Health
  /api/health:
    get:
      summary: Basic health check
      operationId: getHealth
      security: []
      tags: [Health]
      responses:
        '200':
          description: Daemon is running
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }

  /api/health/deep:
    get:
      summary: Deep health check (DB, mesh, IPC)
      operationId: getHealthDeep
      tags: [Health]
      responses:
        '200':
          description: Full subsystem health
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeepHealthStatus' }

  # Repositories (W4)
  /api/repositories:
    get:
      summary: List tracked repositories
      operationId: listRepositories
      tags: [Repositories]
      responses:
        '200':
          description: Repository list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Repository' }

  # Ideas
  /api/ideas:
    get:
      summary: List ideas
      operationId: listIdeas
      tags: [Ideas]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [raw, promoted, archived] }
        - name: tag
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Ideas list
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Idea' } }
    post:
      summary: Create idea
      operationId: createIdea
      tags: [Ideas]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                body: { type: string }
                tags: { type: array, items: { type: string } }
      responses:
        '201':
          description: Idea created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Idea' }

  /api/ideas/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get idea by ID
      operationId: getIdea
      tags: [Ideas]
      responses:
        '200':
          description: Idea detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Idea' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    put:
      summary: Update idea
      operationId: updateIdea
      tags: [Ideas]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                body: { type: string }
                status: { type: string }
      responses:
        '200':
          description: Updated idea
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Idea' }
    delete:
      summary: Delete idea
      operationId: deleteIdea
      tags: [Ideas]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /api/ideas/{id}/notes:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: List notes for idea
      operationId: listIdeaNotes
      tags: [Ideas]
      responses:
        '200':
          description: Notes
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Note' } }
    post:
      summary: Add note to idea
      operationId: createIdeaNote
      tags: [Ideas]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string }
      responses:
        '201':
          description: Note created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Note' }

  /api/ideas/{id}/promote:
    post:
      summary: Promote idea to plan
      operationId: promoteIdea
      tags: [Ideas]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Promoted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  # Overview
  /api/overview:
    get:
      summary: Dashboard overview KPIs
      operationId: getOverview
      tags: [Dashboard]
      responses:
        '200':
          description: Overview data
          content:
            application/json:
              schema:
                type: object
                properties:
                  active_plans: { type: integer }
                  active_agents: { type: integer }
                  tokens_today: { type: integer }
                  mesh_peers: { type: integer }

  /api/mission:
    get:
      summary: Current mission statement
      operationId: getMission
      tags: [Dashboard]
      responses:
        '200':
          description: Mission
          content:
            application/json:
              schema:
                type: object
                properties:
                  mission: { type: string }
                  updated_at: { type: string, format: date-time }

  /api/history:
    get:
      summary: Execution history
      operationId: getHistory
      tags: [Dashboard]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: History entries
          content:
            application/json:
              schema: { type: array, items: { type: object } }

  # Tokens
  /api/tokens/daily:
    get:
      summary: Daily token usage
      operationId: getTokensDaily
      tags: [Tokens]
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 7 }
      responses:
        '200':
          description: Token usage by day
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/TokenUsage' } }

  /api/tokens/models:
    get:
      summary: Token usage by model
      operationId: getTokensByModel
      tags: [Tokens]
      responses:
        '200':
          description: Per-model token stats
          content:
            application/json:
              schema: { type: object, additionalProperties: { type: integer } }

  # Agents
  /api/agents:
    get:
      summary: List active agents
      operationId: listAgents
      tags: [Agents]
      responses:
        '200':
          description: Agent list
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Agent' } }

  /api/agents/catalog:
    get:
      summary: Agent capability catalog
      operationId: getAgentCatalog
      tags: [Agents]
      responses:
        '200':
          description: Catalog entries
          content:
            application/json:
              schema: { type: array, items: { type: object } }

  /api/agents/sync:
    post:
      summary: Sync agent registry
      operationId: syncAgents
      tags: [Agents]
      responses:
        '200':
          description: Synced
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /api/agents/enable:
    post:
      summary: Enable agent
      operationId: enableAgent
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '200':
          description: Enabled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /api/agents/disable:
    post:
      summary: Disable agent
      operationId: disableAgent
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '200':
          description: Disabled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /api/agents/create:
    post:
      summary: Create new agent session
      operationId: createAgent
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name: { type: string }
                type: { type: string }
                task_id: { type: string }
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }

  /api/agents/triage:
    post:
      summary: Triage agent routing
      operationId: triageAgent
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                task: { type: string }
                context: { type: object }
      responses:
        '200':
          description: Triage result
          content:
            application/json:
              schema: { type: object }

  /api/agents/scaffold:
    post:
      summary: Scaffold new agent definition
      operationId: scaffoldAgent
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name: { type: string }
                type: { type: string }
      responses:
        '200':
          description: Scaffold result
          content:
            application/json:
              schema: { type: object }

  # Mesh
  /api/mesh:
    get:
      summary: Mesh overview
      operationId: getMesh
      tags: [Mesh]
      responses:
        '200':
          description: Mesh status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeshStatus' }

  /api/mesh/logs:
    get:
      summary: Mesh logs
      operationId: getMeshLogs
      tags: [Mesh]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
      responses:
        '200':
          description: Log entries
          content:
            application/json:
              schema: { type: array, items: { type: object } }

  /api/mesh/metrics:
    get:
      summary: Mesh metrics
      operationId: getMeshMetrics
      tags: [Mesh]
      responses:
        '200':
          description: Metrics snapshot
          content:
            application/json:
              schema: { type: object }

  /api/mesh/sync-stats:
    get:
      summary: Mesh sync statistics
      operationId: getMeshSyncStats
      tags: [Mesh]
      responses:
        '200':
          description: Sync stats
          content:
            application/json:
              schema: { type: object }

  /api/mesh/sync-status:
    get:
      summary: Mesh sync status
      operationId: getMeshSyncStatus
      tags: [Mesh]
      responses:
        '200':
          description: Sync status
          content:
            application/json:
              schema: { type: object }

  /api/mesh/traffic:
    get:
      summary: Mesh traffic stats
      operationId: getMeshTraffic
      tags: [Mesh]
      responses:
        '200':
          description: Traffic data
          content:
            application/json:
              schema: { type: object }

  /api/mesh/provision:
    get:
      summary: Mesh provision status
      operationId: getMeshProvision
      tags: [Mesh]
      responses:
        '200':
          description: Provision info
          content:
            application/json:
              schema: { type: object }

  /api/mesh/topology:
    get:
      summary: Mesh topology graph
      operationId: getMeshTopology
      tags: [Mesh]
      responses:
        '200':
          description: Topology
          content:
            application/json:
              schema: { type: object }

  /api/mesh/ping/{peer}:
    get:
      summary: Ping mesh peer
      operationId: pingMeshPeer
      tags: [Mesh]
      parameters:
        - name: peer
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Ping result
          content:
            application/json:
              schema: { type: object, properties: { ok: { type: boolean }, latency_ms: { type: integer } } }

  /api/mesh/diagnostics:
    get:
      summary: Mesh diagnostics
      operationId: getMeshDiagnostics
      tags: [Mesh]
      responses:
        '200':
          description: Diagnostics
          content:
            application/json:
              schema: { type: object }

  /api/mesh/init:
    post:
      summary: Initialize mesh node
      operationId: initMesh
      tags: [Mesh]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                node_id: { type: string }
                peers: { type: array, items: { type: string } }
      responses:
        '200':
          description: Initialized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /api/mesh/exec:
    post:
      summary: Execute command on mesh node
      operationId: meshExec
      tags: [Mesh]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [peer, command]
              properties:
                peer: { type: string }
                command: { type: string }
                args: { type: array, items: { type: string } }
      responses:
        '200':
          description: Exec result
          content:
            application/json:
              schema: { type: object }

  /api/mesh/delegate:
    post:
      summary: Delegate task to mesh peer
      operationId: meshDelegate
      tags: [Mesh]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [peer, task_id]
              properties:
                peer: { type: string }
                task_id: { type: string }
                payload: { type: object }
      responses:
        '200':
          description: Delegation accepted
          content:
            application/json:
              schema: { type: object, properties: { delegation_id: { type: string } } }

  /api/mesh/delegate/{id}/cancel:
    post:
      summary: Cancel mesh delegation
      operationId: cancelMeshDelegate
      tags: [Mesh]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  # Peers
  /api/peers:
    get:
      summary: List peers
      operationId: listPeers
      tags: [Peers]
      responses:
        '200':
          description: Peer list
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Peer' } }
    post:
      summary: Add peer
      operationId: addPeer
      tags: [Peers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, host]
              properties:
                name: { type: string }
                host: { type: string }
                port: { type: integer, default: 8420 }
      responses:
        '201':
          description: Peer added
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Peer' }

  /api/peers/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string }
    put:
      summary: Update peer
      operationId: updatePeer
      tags: [Peers]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                host: { type: string }
                port: { type: integer }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Peer' }
    delete:
      summary: Remove peer
      operationId: removePeer
      tags: [Peers]
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /api/peers/discover:
    get:
      summary: Discover peers on network
      operationId: discoverPeers
      tags: [Peers]
      responses:
        '200':
          description: Discovered peers
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Peer' } }

  /api/peers/coordinator:
    get:
      summary: Get coordinator peer
      operationId: getCoordinatorPeer
      tags: [Peers]
      responses:
        '200':
          description: Coordinator info
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Peer' }

  /api/peers/ssh-check:
    post:
      summary: Check SSH connectivity to peer
      operationId: sshCheckPeer
      tags: [Peers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [host]
              properties:
                host: { type: string }
                port: { type: integer, default: 22 }
      responses:
        '200':
          description: SSH check result
          content:
            application/json:
              schema: { type: object, properties: { ok: { type: boolean }, latency_ms: { type: integer } } }

  # Projects
  /api/projects:
    get:
      summary: List projects
      operationId: listProjects
      tags: [Projects]
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema: { type: array, items: { type: object } }
    post:
      summary: Create project
      operationId: createProject
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                path: { type: string }
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema: { type: object }

  /api/project/{id}/tree:
    get:
      summary: Project file tree
      operationId: getProjectTree
      tags: [Projects]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: File tree
          content:
            application/json:
              schema: { type: object }

  /api/plan-status:
    post:
      summary: Update plan status
      operationId: updatePlanStatus
      tags: [Plans]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id, status]
              properties:
                plan_id: { type: integer }
                status: { type: string }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /api/plans/{plan_id}/validate:
    post:
      summary: Validate plan
      operationId: validatePlan
      tags: [Plans]
      parameters:
        - name: plan_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema: { type: object }

  # Tasks
  /api/tasks/distribution:
    get:
      summary: Task distribution across waves
      operationId: getTaskDistribution
      tags: [Tasks]
      responses:
        '200':
          description: Distribution data
          content:
            application/json:
              schema: { type: object }

  /api/tasks/blocked:
    get:
      summary: List blocked tasks
      operationId: getBlockedTasks
      tags: [Tasks]
      responses:
        '200':
          description: Blocked tasks
          content:
            application/json:
